name: ci-lite

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run repository health check
        run: python scripts/check_repo_health.py

      - name: Run standard-library unit tests
        run: python -m unittest discover -s tests

      - name: Compile local Python sources
        run: python -m compileall scripts experiments
